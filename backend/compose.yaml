services:
  api:
    image: pz/api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PZ_DATABASE_URL=${PZ_DATABASE_URL:?Variable not set}
      - PZ_DEBUG=${PZ_DEBUG:?Variable not set}
      - PZ_CORS_ORIGINS=${PZ_CORS_ORIGINS:?Variable not set}
      - PZ_CORS_HEADERS=${PZ_CORS_HEADERS:?Variable not set}

      - PZ_ENV=${PZ_ENV:?Variable not set}

      - PZ_JWT_SECRET_KEY=${PZ_JWT_SECRET_KEY:?Variable not set}
      - PZ_ACCESS_TOKEN_EXPIRE_MINUTES=${PZ_ACCESS_TOKEN_EXPIRE_MINUTES:?Variable not set}
      - PZ_JWT_ALGORITHM=${PZ_JWT_ALGORITHM:?Variable not set}

      - PZ_GOOGLE_CLIENT_ID=${PZ_GOOGLE_CLIENT_ID:?Variable not set}
      - PZ_GOOGLE_CLIENT_SECRET=${PZ_GOOGLE_CLIENT_SECRET:?Variable not set}
      - PZ_GOOGLE_REDIRECT_URI=${PZ_GOOGLE_REDIRECT_URI:?Variable not set}
    depends_on:
      db:
        condition: service_healthy
    command: uv run fastapi dev src/main.py --host 0.0.0.0 --port 8000

  db:
    image: mysql:9.7.0
    environment:
      - MYSQL_ROOT_PASSWORD=${PZ_MYSQL_ROOT_PASSWORD:?Variable not set}
      - MYSQL_DATABASE=${PZ_DB_NAME:?Variable not set}
      - MYSQL_USER=${PZ_DB_USER:?Variable not set}
      - MYSQL_PASSWORD=${PZ_DB_PASSWORD:?Variable not set}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PWD?}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data: