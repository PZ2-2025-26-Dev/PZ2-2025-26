services:
  api:
    build:
      target: dev
    environment:
      UV_NO_DEV: "0"
      PZ_DEBUG: "1"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: sh -c "uv sync --locked --dev && uv run fastapi dev src/main.py --host 0.0.0.0 --port 8000"

  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  load-tests:
    image: grafana/k6:0.52.0
    profiles:
      - load-tests
    user: "0:0"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://frontend:5173}
      FRONTEND_HOST_HEADER: ${FRONTEND_HOST_HEADER:-localhost:5173}
      E2E_ADMIN_EMAIL: ${E2E_ADMIN_EMAIL:-admin.seed@example.com}
      E2E_ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD:-SeedPassword123!}
      E2E_REGULAR_EMAIL: ${E2E_REGULAR_EMAIL:-user.seed@example.com}
      E2E_REGULAR_PASSWORD: ${E2E_REGULAR_PASSWORD:-SeedPassword123!}
      E2E_READ_VUS: ${E2E_READ_VUS:-8}
      E2E_READ_DURATION: ${E2E_READ_DURATION:-1m}
      E2E_ADMIN_VUS: ${E2E_ADMIN_VUS:-3}
      E2E_ADMIN_DURATION: ${E2E_ADMIN_DURATION:-1m}
      E2E_CRUD_RATE: ${E2E_CRUD_RATE:-4}
      E2E_CRUD_DURATION: ${E2E_CRUD_DURATION:-45s}
      E2E_CRUD_PREALLOCATED_VUS: ${E2E_CRUD_PREALLOCATED_VUS:-6}
      E2E_CRUD_MAX_VUS: ${E2E_CRUD_MAX_VUS:-12}
    volumes:
      - ./e2e/tests:/scripts:ro
      - ./e2e/results:/results
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    command:
      - run
      - --summary-export
      - /results/summary.json
      - /scripts/load-test.js

volumes:
  backend_venv:
  frontend_node_modules:
