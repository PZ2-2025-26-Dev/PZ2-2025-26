services:
  db:
    image: mysql:9.7.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PWD:?Variable not set}
      MYSQL_DATABASE: ${DB_NAME:?Variable not set}
      MYSQL_USER: ${DB_USER:?Variable not set}
      MYSQL_PASSWORD: ${DB_PWD:?Variable not set}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    image: pz/api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:?Variable not set}:8000"
    environment:
      PZ_DATABASE_URL: ${PZ_DATABASE_URL:?Variable not set}
      PZ_DEBUG: ${PZ_DEBUG:?Variable not set}
      PZ_CORS_ORIGINS: ${PZ_CORS_ORIGINS:?Variable not set}
      PZ_CORS_HEADERS: ${PZ_CORS_HEADERS:?Variable not set}
      PZ_ENV: ${PZ_ENV:?Variable not set}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: pz/frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:?Variable not set}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:?Variable not set}
    depends_on:
      api:
        condition: service_healthy

  adminer:
    image: adminer:5.4.0
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:?Variable not set}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
