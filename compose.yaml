services:
  db:
    image: mysql:9.7.0
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PWD:-password}
      MYSQL_DATABASE: ${DB_NAME:-app_db}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PWD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    image: pz/api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PZ_DATABASE_URL: ${PZ_DATABASE_URL:-mysql+pymysql://user:password@db:3306/app_db}
      PZ_DEBUG: ${PZ_DEBUG:-1}
      PZ_CORS_ORIGINS: ${PZ_CORS_ORIGINS:-["http://localhost:5173","http://localhost:5174"]}
      PZ_CORS_HEADERS: ${PZ_CORS_HEADERS:-["*"]}
      PZ_ENV: ${PZ_ENV:-dev}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: sh -c "uv sync --locked && uv run fastapi dev src/main.py --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: pz/frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_started

volumes:
  backend_venv:
  frontend_node_modules:
  mysql_data:
